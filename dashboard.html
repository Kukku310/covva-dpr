<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>COVVA — Site Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ── CSS VARIABLES ── */
:root {
  --bg:      #f5f2ee;
  --surface: #ffffff;
  --panel:   #f0ece6;
  --border:  #e0dbd3;
  --amber:   #b8711f;
  --amber-glow: rgba(184,113,31,0.12);
  --amber-dim: #9a5a18;
  --text:    #1a1714;
  --text-dim: var(--dim);
  --card:    var(--surface);
  --dim:     #9a9188;
  --mid:     #5c5148;
  --green:   #1e8449;
  --blue:    #1a6fa0;
  --red:     #a93226;
  --yellow:  #d4ac0d;
  --grey:    #c8c0b8;
  --purple:  #7d3c98;
}
body.dark {
  --bg:      #0e0e0e;
  --surface: #161616;
  --panel:   #1e1e1e;
  --border:  #2a2a2a;
  --amber:   #d4872a;
  --amber-glow: rgba(212,135,42,0.15);
  --amber-dim: #8a5515;
  --text:    #e8e2d9;
  --text-dim: var(--dim);
  --card:    var(--surface);
  --dim:     #7a7268;
  --mid:     #a89f94;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
}

/* ── HEADER ── */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 14px 12px;
  position: sticky;
  top: 0;
  z-index: 200;
}
.header-row1 {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 4px;
  flex-wrap: wrap;
}
.logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 26px;
  letter-spacing: 3px;
  color: var(--amber);
  line-height: 1;
}
.logo-sep { color: var(--border); font-size: 18px; }
.project-name {
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  color: var(--mid);
  text-transform: uppercase;
  letter-spacing: 1px;
  flex: 1;
}
.header-row2 {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--dim);
  letter-spacing: 0.5px;
  margin-bottom: 10px;
}
.header-controls {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}
.header-select {
  background: var(--panel);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 4px;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  padding: 5px 8px;
  cursor: pointer;
  outline: none;
  flex: 1;
  min-width: 140px;
}
.header-select:focus { border-color: var(--amber); }
.hdr-btn {
  background: var(--panel);
  color: var(--dim);
  border: 1px solid var(--border);
  border-radius: 4px;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.5px;
  padding: 5px 10px;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.hdr-btn:hover { border-color: var(--amber); color: var(--amber); }
.hdr-btn.active { background: var(--amber); color: var(--bg); border-color: var(--amber); }

/* ── PDF EXPORT BAR ── */
.pdf-bar {
  background: rgba(184,113,31,0.08);
  border-bottom: 1px solid var(--border);
  padding: 7px 20px;
  display: none;
  align-items: center;
  justify-content: flex-end;
  gap: 10px;
}
.pdf-bar.visible { display: flex; }
.pdf-bar-text {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--amber);
  flex: 1;
}
.export-btn {
  background: none;
  border: 1px solid var(--amber);
  color: var(--amber);
  border-radius: 4px;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  padding: 4px 10px;
  cursor: pointer;
  transition: all 0.2s;
}
.export-btn:hover { background: var(--amber); color: var(--bg); }

/* ── MAIN ── */
.main { padding: 20px 12px; max-width: 1280px; margin: 0 auto; }

/* ── SECTION TITLE ── */
.section-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 18px;
  letter-spacing: 2px;
  color: var(--text);
  margin-bottom: 12px;
  margin-top: 28px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.section-title:first-child { margin-top: 0; }
.section-num {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--amber);
  border: 1px solid var(--amber);
  border-radius: 50%;
  width: 20px; height: 20px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}
.internal-only {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--dim);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 1px 5px;
  letter-spacing: 0.3px;
}

/* ── LOADING ── */
.loading-state {
  padding: 40px;
  text-align: center;
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  color: var(--dim);
  letter-spacing: 1px;
}
.loading-dot {
  display: inline-block;
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--amber);
  animation: blink 1s ease infinite;
  margin-right: 8px;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

/* ── GANTT ── */
.gantt-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
  margin-bottom: 12px;
}
.gantt-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 6px; }
.gantt-toggle-btn {
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  font-weight: 500;
  letter-spacing: 0.02em;
  padding: 5px 13px;
  border-radius: 20px;
  border: 1.5px solid var(--border);
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
  transition: background 0.15s ease, border-color 0.15s ease,
              color 0.15s ease;
  user-select: none;
  white-space: nowrap;
}
.gantt-toggle-btn.active {
  border-color: var(--amber);
  color: var(--amber);
  background: rgba(196,152,79,0.07);
}
#toggleDRW.active {
  border-color: #7d3c98;
  color: #7d3c98;
  background: rgba(125,60,152,0.07);
}
.gantt-toggle-btn:hover {
  opacity: 0.75;
}
/* Hybrid Gantt layout */
.g-container { display: inline-block; min-width: 100%; user-select: none; }
.g-axis-row { display: flex; align-items: flex-end; height: 28px; }
.g-axis-label-spacer { flex-shrink: 0; }
.g-axis-ticks { position: relative; flex-shrink: 0; overflow: visible; }
.g-axis-ticks span {
  position: absolute;
  bottom: 6px;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  font-weight: 500;
  color: var(--text);
  white-space: nowrap;
  transform: translateX(3px);
  pointer-events: none;
}
.g-row { display: flex; align-items: center; height: 36px; cursor: pointer; }
.g-row:hover .g-label { color: var(--amber); }
.g-label {
  flex-shrink: 0;
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  font-weight: 500;
  color: var(--text);
  text-align: right;
  padding-left: 8px;
  padding-right: 16px;
  line-height: 1.3;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.g-track { display: block; flex-shrink: 0; }
.g-today-label {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  font-weight: 500;
  color: var(--amber);
  padding: 2px 0;
  display: flex;
  height: 18px;
}

/* ── GANTT LEGEND ── */
.gantt-legend {
  display: flex;
  flex-wrap: wrap;
  gap: 12px 16px;
  padding: 10px 16px;
  border-top: 1px solid var(--border);
  background: var(--panel);
}
.legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--dim);
}
.legend-dot {
  width: 10px; height: 10px;
  border-radius: 2px;
  flex-shrink: 0;
}

/* ── GANTT DETAIL PANEL ── */
.gantt-detail {
  background: var(--panel);
  border-top: 1px solid var(--border);
  padding: 16px;
  display: none;
}
.gantt-detail.visible { display: block; }
.detail-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 16px;
  letter-spacing: 1.5px;
  color: var(--text);
  margin-bottom: 10px;
}
.detail-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 8px;
  margin-bottom: 12px;
}
.detail-cell-label {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--dim);
  letter-spacing: 0.5px;
  margin-bottom: 2px;
}
.detail-cell-value {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  color: var(--text);
}
.change-log-title {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--dim);
  letter-spacing: 0.5px;
  text-transform: uppercase;
  margin-bottom: 6px;
  margin-top: 12px;
}
.change-entry {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  padding: 6px 10px;
  border-radius: 4px;
  margin-bottom: 4px;
  line-height: 1.5;
}
.change-entry.delay { background: rgba(169,50,38,0.1); color: #c0392b; }
.change-entry.work-increase { background: rgba(125,60,152,0.1); color: #8e44ad; }
.change-entry.start-delayed { background: rgba(26,111,160,0.1); color: #2980b9; }

/* ── STRENGTH ── */
.strength-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 16px;
  margin-bottom: 12px;
}
.strength-toggle {
  display: flex;
  gap: 8px;
  margin-bottom: 14px;
}
.strength-tab {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  padding: 5px 12px;
  border-radius: 4px;
  border: 1px solid var(--border);
  background: none;
  color: var(--dim);
  cursor: pointer;
  transition: all 0.2s;
}
.strength-tab.active { background: var(--amber-glow); color: var(--amber); border-color: var(--amber-dim); }
.strength-total {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 36px;
  color: var(--amber);
  line-height: 1;
  margin-bottom: 4px;
}
.strength-label {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--dim);
  letter-spacing: 1px;
  margin-bottom: 16px;
}
.trade-bar-row {
  margin-bottom: 8px;
}
.trade-bar-label {
  display: flex;
  justify-content: space-between;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--mid);
  margin-bottom: 3px;
}
.trade-bar-track {
  height: 6px;
  background: var(--panel);
  border-radius: 3px;
  overflow: hidden;
}
.trade-bar-fill {
  height: 100%;
  background: var(--amber);
  border-radius: 3px;
  transition: width 0.5s ease;
}

/* ── MATERIAL TABLE ── */
.material-section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
  margin-bottom: 12px;
}
.material-intro {
  padding: 10px 16px;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--dim);
  border-bottom: 1px solid var(--border);
  background: var(--panel);
}
.material-row {
  display: grid;
  grid-template-columns: 200px 1fr auto;
  align-items: center;
  gap: 12px;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
}
.material-row:last-child { border-bottom: none; }
.material-name {
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
}
.material-area {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--dim);
  margin-top: 2px;
}
.material-meta {
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  color: var(--text-dim, var(--dim));
  line-height: 1.5;
}
.status-badge {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.5px;
  padding: 3px 7px;
  border-radius: 3px;
  border: 1px solid;
  white-space: nowrap;
  flex-shrink: 0;
}
.badge-red    { color: #c0392b; border-color: rgba(192,57,43,0.4); background: rgba(192,57,43,0.08); }
.badge-amber  { color: var(--amber); border-color: rgba(184,113,31,0.4); background: var(--amber-glow); }
.badge-blue   { color: #2980b9; border-color: rgba(41,128,185,0.4); background: rgba(41,128,185,0.08); }
.badge-green  { color: #1e8449; border-color: rgba(30,132,73,0.4); background: rgba(30,132,73,0.08); }
.badge-grey   { color: var(--grey); border-color: rgba(154,145,136,0.4); background: rgba(154,145,136,0.08); }

/* ── DPR ARCHIVE ── */
.dpr-archive {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
  margin-bottom: 12px;
}
.dpr-entry {
  border-bottom: 1px solid var(--border);
}
.dpr-entry:last-child { border-bottom: none; }
.dpr-entry-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  cursor: pointer;
  transition: background 0.15s;
}
.dpr-entry-header:hover { background: var(--panel); }
.dpr-entry-date {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--amber);
  min-width: 80px;
}
.dpr-entry-preview {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--dim);
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.dpr-entry-arrow {
  font-size: 10px;
  color: var(--dim);
  transition: transform 0.2s;
}
.dpr-entry-arrow.open { transform: rotate(90deg); }
.dpr-entry-body {
  display: none;
  padding: 0 16px 16px;
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  color: var(--text);
  white-space: pre-wrap;
  line-height: 1.7;
  border-top: 1px solid var(--border);
  background: var(--panel);
}
.dpr-entry-body.open { display: block; }

/* ── FLAGS ── */
.flags-section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
  margin-bottom: 12px;
}
.flag-row {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  flex-wrap: wrap;
}
.flag-row:last-child { border-bottom: none; }
.flag-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
.flag-content { flex: 1; min-width: 0; }
.flag-title {
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 2px;
}
.flag-detail {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--dim);
  line-height: 1.5;
}
.flag-actions { display: flex; gap: 6px; flex-shrink: 0; }
.flag-btn {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  padding: 3px 8px;
  border-radius: 3px;
  border: 1px solid var(--border);
  background: none;
  color: var(--dim);
  cursor: pointer;
  transition: all 0.15s;
}
.flag-btn:hover { border-color: var(--amber); color: var(--amber); }

/* ── EMPTY STATE ── */
.empty-state {
  padding: 24px;
  text-align: center;
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--dim);
}

/* ── PICKER ROW ── */
.picker-row {
  padding: 14px 16px;
  border: 1px solid var(--border);
  border-radius: 4px;
  margin-bottom: 8px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 18px;
  letter-spacing: 1.5px;
  color: var(--text);
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
}
.picker-row:hover { border-color: var(--amber-dim); background: var(--panel); }

/* ── STRENGTH CHART ── */
.strength-chart-container { overflow-x: auto; }

/* ── PDF MODAL ── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 1000;
  overflow-y: auto;
  padding: 20px;
}
.modal-overlay.visible { display: flex; align-items: flex-start; justify-content: center; }
.modal-box {
  background: #ffffff;
  color: #1a1714;
  border-radius: 6px;
  max-width: 760px;
  width: 100%;
  padding: 30px;
  margin: auto;
}
.modal-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 20px;
  padding-bottom: 16px;
  border-bottom: 2px solid #b8711f;
}
.modal-logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px;
  letter-spacing: 3px;
  color: #b8711f;
  line-height: 1;
}
.modal-sub {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: #9a9188;
  letter-spacing: 1px;
  margin-top: 2px;
}
.modal-project-info {
  text-align: right;
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  font-weight: 500;
  color: #5c5148;
  line-height: 1.5;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 0;
}
.modal-section-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 14px;
  letter-spacing: 1.5px;
  color: #1a1714;
  margin: 16px 0 8px;
}
.modal-footer {
  margin-top: 20px;
  padding-top: 12px;
  border-top: 1px solid #e0dbd3;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: #9a9188;
  text-align: center;
}
.modal-actions {
  display: flex;
  gap: 10px;
  justify-content: flex-end;
  margin-top: 20px;
}
.modal-btn {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 15px;
  letter-spacing: 1.5px;
  padding: 8px 18px;
  border-radius: 4px;
  border: none;
  cursor: pointer;
  transition: all 0.2s;
}
.modal-btn-print { background: #b8711f; color: #fff; }
.modal-btn-print:hover { background: #9a5a18; }
.modal-btn-close { background: #f0ece6; color: #5c5148; border: 1px solid #e0dbd3; }
.modal-btn-close:hover { border-color: #b8711f; color: #b8711f; }

@media print {
  /* Let screen styles (padding, max-width, fonts) carry through unchanged.
     Only strip what breaks print: overlay chrome, box-shadow, fixed positioning. */
  @page { margin: 0.8cm 0.4cm; }
  body { margin: 0; }
  /* force browsers to print background colours (zebra rows, header fills) */
  * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
  body > *:not(.modal-overlay) { display: none !important; }
  .modal-actions { display: none !important; }
  .modal-overlay {
    position: static !important;
    background: none !important;
    padding: 0 !important;
    overflow: visible !important;
    display: block !important;
  }
  .modal-overlay.visible { display: block !important; }
  .modal-box { box-shadow: none !important; border-radius: 0 !important; overflow: visible !important; padding: 8px 16px 16px !important; }
  /* heading never orphans at bottom of a page */
  .modal-section-title { break-after: avoid; page-break-after: avoid; }
  /* no row splits mid-line */
  tr { break-inside: avoid; page-break-inside: avoid; }
  /* no vertical borders — clean open look matching on-screen preview */
  .pdf-section-group { border: none; padding: 0; }
}

.footer {
  padding: 20px;
  text-align: center;
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--dim);
  letter-spacing: 1px;
  border-top: 1px solid var(--border);
  margin-top: 30px;
}

/* ── STRENGTH LINE CHART (canvas-based) ── */
.canvas-chart { width: 100%; max-height: 220px; }

/* ── MRD POPOVER ── */
.mrd-popover {
  position: fixed;
  z-index: 500;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 10px 14px;
  min-width: 180px;
  max-width: 240px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.18);
  pointer-events: none;
}
.mrd-popover-name {
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 4px;
}
.mrd-popover-area {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--dim);
  margin-bottom: 6px;
}
.mrd-popover-row {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--text);
  margin-bottom: 4px;
}

/* ── PROCUREMENT TABLE ── */
.procurement-section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
  margin-bottom: 12px;
}
.procurement-header {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding: 8px 16px;
  border-bottom: 1px solid var(--border);
  background: var(--panel);
}
.procurement-intro {
  padding: 8px 16px;
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  color: var(--dim);
  border-bottom: 1px solid var(--border);
}
.procurement-table {
  width: 100%;
  border-collapse: collapse;
}
.procurement-table th {
  text-align: left;
  padding: 8px 12px;
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  font-weight: 500;
  color: var(--mid);
  background: var(--panel);
  border-bottom: 2px solid var(--border);
}
.procurement-table td {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--dim);
  vertical-align: middle;
}
.procurement-table td.p-name {
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
}
.procurement-table tr:last-child td { border-bottom: none; }
.procurement-table tr:nth-child(even) { background: var(--panel); }
.procurement-table tr:hover td { background: var(--amber-glow); }

/* ── COPY TOAST ── */
.copy-toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--text);
  color: var(--bg);
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  padding: 8px 18px;
  border-radius: 20px;
  z-index: 9999;
  opacity: 0;
  transition: opacity 0.2s;
  pointer-events: none;
}
.copy-toast.visible { opacity: 1; }
</style>
</head>
<body>

<div class="header">
  <div class="header-row1">
    <div class="logo">COVVA</div>
    <div class="logo-sep">|</div>
    <div class="project-name" id="projectDisplay">Loading...</div>
  </div>
  <div class="header-row2" id="headerMeta">—</div>
  <div class="header-controls">
    <select class="header-select" id="projectSelector" onchange="switchProject(this.value)">
      <option value="">Select project...</option>
    </select>
    <button class="hdr-btn" id="refreshBtn" onclick="refreshDashboard()">↺ Refresh</button>
    <button class="hdr-btn" id="darkBtn" onclick="toggleTheme()">Dark Mode</button>
    <button class="hdr-btn" id="clientBtn" onclick="toggleClientView()">Client View</button>
  </div>
</div>

<div class="pdf-bar" id="pdfBar">
  <span class="pdf-bar-text">Client View — showing public data only</span>
  <button class="export-btn" onclick="openPDFModal()">⬇ Export PDF</button>
</div>

<div class="main" id="mainContent">
  <div class="loading-state" id="loadingState">
    <span class="loading-dot"></span> Loading project data...
  </div>
</div>

<!-- PDF MODAL -->
<div class="modal-overlay" id="pdfModal">
  <div class="modal-box">
    <div class="modal-header">
      <div>
        <div class="modal-logo">COVVA</div>
        <div class="modal-sub">SITE REPORT</div>
      </div>
      <div class="modal-project-info" id="pdfModalMeta"></div>
    </div>
    <div class="pdf-section-group">
      <div class="modal-section-title">Activity Schedule</div>
      <div id="pdfGanttContainer"></div>
    </div>
    <div class="pdf-section-group" style="margin-top:20px">
      <div class="modal-section-title">Pending Client Actions</div>
      <div id="pdfMaterialsContainer"></div>
    </div>
    <div class="pdf-section-group" style="margin-top:16px">
      <div class="modal-section-title" id="pdfProcurementTitle" style="display:none">Procurement Schedule</div>
      <div id="pdfProcurementContainer"></div>
    </div>
    <div class="modal-footer" id="pdfFooter"></div>
    <div class="modal-actions">
      <button class="modal-btn modal-btn-close" onclick="closePDFModal()">Close Preview</button>
      <button class="modal-btn modal-btn-print" onclick="window.print()">Print / Save as PDF</button>
    </div>
  </div>
</div>

<div class="footer">COVVA SITE INTELLIGENCE</div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyVlr7PmcDZZIr7hBddxMwVINBuaX1iorqExu1YLYMz6K4mb3UQsGsnplASPMVPrWdc/exec';
const APPS_SCRIPT_PROJECT_LIST_URL = 'https://script.google.com/macros/s/AKfycbwiaQ3CA6cHDhkTZJWvwFBhLi8KnEftj0_fdtKIYUlqk03pOPS4shV_aD3RbsYVaUWp/exec';

// ─── STATE ────────────────────────────────────────────────────
const params = new URLSearchParams(window.location.search);
let currentProject = params.get('project') || '';
let isClientView   = false;
let dashData       = null;
const ganttOverlayState = { mrd: true, drw: true };
const TIMELINE_DETAIL_NOTES = {
  'modi basement': {
    'paint and polish': ['① 04 May 2026 — Paint Polish in progress'],
    'hvac work': ['① 04 May 2026 — HVAC Work in progress'],
    'bathroom sanitary work': ['① 04 May 2026 — Bathroom Sanitary Work completed in 15 days'],
    'gym area mirror wall': ['① 04 May 2026 — Gym Area Mirror Wall in progress']
  }
};

function toggleGanttOverlay(type) {
  ganttOverlayState[type] = !ganttOverlayState[type];
  const btn = document.getElementById(
    type === 'mrd' ? 'toggleMRD' : 'toggleDRW'
  );
  if (btn) btn.classList.toggle('active', ganttOverlayState[type]);
  document.querySelectorAll(`.gantt-overlay-${type}`)
    .forEach(el => {
      el.style.display = ganttOverlayState[type] ? 'block' : 'none';
    });
}

// ─── THEME ────────────────────────────────────────────────────
function applyTheme(isDark) {
  document.body.classList.toggle('dark', isDark);
  document.getElementById('darkBtn').textContent = isDark ? 'Light Mode' : 'Dark Mode';
  try { localStorage.setItem('covva-dash-theme', isDark ? 'dark' : 'light'); } catch(e) {}
  // Re-render dashboard so hybrid Gantt canvas bars rebuild with correct dark/light colours
  if (dashData) renderDashboard();
}
function toggleTheme() { applyTheme(!document.body.classList.contains('dark')); }
(function(){
  try {
    const saved = localStorage.getItem('covva-dash-theme');
    applyTheme(saved === 'dark');
  } catch(e) { applyTheme(false); }
})();

// ─── CLIENT VIEW ──────────────────────────────────────────────
function toggleClientView() {
  isClientView = !isClientView;
  document.getElementById('clientBtn').classList.toggle('active', isClientView);
  document.getElementById('pdfBar').classList.toggle('visible', isClientView);
  renderDashboard();
}

// ─── PROJECT SWITCH ───────────────────────────────────────────
async function refreshDashboard() {
  const btn = document.getElementById('refreshBtn');
  btn.textContent = '↺ Refreshing...';
  btn.disabled = true;
  await loadDashboard();
  btn.textContent = '↺ Refresh';
  btn.disabled = false;
}

function switchProject(name) {
  if (!name) return;
  currentProject = name;
  const url = new URL(window.location);
  url.searchParams.set('project', name);
  window.history.replaceState({}, '', url);
  loadDashboard();
}

// ─── LOAD DATA ────────────────────────────────────────────────
async function loadDashboard() {
  if (!currentProject) {
    document.getElementById('mainContent').innerHTML =
      '<div class="loading-state">Select a project above.</div>';
    return;
  }

  document.getElementById('mainContent').innerHTML =
    '<div class="loading-state"><span class="loading-dot"></span> Loading project data...</div>';

  try {
    const url = `${APPS_SCRIPT_URL}?action=dashboardData&project=${encodeURIComponent(currentProject)}&_ts=${Date.now()}`;
    const resp = await fetch(url, { redirect: 'follow' });
    const data = await resp.json();
    if (!data.success) throw new Error(data.error || 'Load failed');

    dashData = data;
    dashData._loadedAt = Date.now();
    await loadProjectList();
    // Wait for Google Fonts to load before rendering SVG Gantt text
    await document.fonts.ready;
    renderDashboard();
  } catch(err) {
    document.getElementById('mainContent').innerHTML =
      `<div class="loading-state">Error loading data: ${err.message}</div>`;
  }
}

async function loadProjectList() {
  try {
    const url = `${APPS_SCRIPT_PROJECT_LIST_URL}?action=listProjects`;
    const resp = await fetch(url, { redirect: 'follow' });
    const data = await resp.json();
    if (!data.success || !data.projects) return;
    const sel = document.getElementById('projectSelector');
    sel.innerHTML = '<option value="">Select project...</option>';
    const autoSelect = currentProject || (dashData && dashData.project) || '';
    data.projects.forEach(p => {
      const opt = document.createElement('option');
      const pName = (typeof p === 'object') ? p.name : p;
      opt.value = pName;
      opt.textContent = pName;
      if (pName === autoSelect) opt.selected = true;
      sel.appendChild(opt);
    });
  } catch(e) { /* silently fail — project list is optional UI */ }
}

// ─── RENDER DASHBOARD ─────────────────────────────────────────
function renderDashboard() {
  if (!dashData) return;

  const d = dashData;
  const pName = d.project || currentProject;

  // Header
  document.getElementById('projectDisplay').textContent = pName.toUpperCase();

  // Compute date range + day count from activities
  const allDates = (d.activities || []).flatMap(a => [a.planned_start, a.planned_end, a.current_end]).map(parseSheetDate).filter(Boolean);
  const startDate = allDates.length ? new Date(Math.min(...allDates)) : null;
  const endDate   = allDates.length ? new Date(Math.max(...allDates)) : null;
  const today     = new Date();

  let metaText = '—';
  if (startDate && endDate) {
    const dayX = Math.round((today - startDate) / 86400000) + 1;
    const dayY = Math.round((endDate - startDate) / 86400000) + 1;
    metaText = `${fmtDateShort(startDate)} — ${fmtDateShort(endDate)}  ·  Day ${dayX} of ${dayY}`;
  }
  document.getElementById('headerMeta').textContent = metaText;

  const main = document.getElementById('mainContent');
  main.innerHTML = '';

  // ── Section 1: Timeline ──
  main.appendChild(buildTimelineSectionHeader());
  const sortedActivities = [...(d.activities || [])].sort((a, b) => {
    const da = parseSheetDate(a.planned_start);
    const db = parseSheetDate(b.planned_start);
    if (!da && !db) return 0;
    if (!da) return 1;
    if (!db) return -1;
    return da - db;
  });
  main.appendChild(buildGantt(sortedActivities, d.dprs || [], today, startDate, endDate));

  // ── Section 2: Site Strength (internal) ──
  if (!isClientView) {
    main.appendChild(buildSectionTitle('②', 'Site Strength', true));
    main.appendChild(buildStrengthSection(d.dprs || []));
  }

  // ── Section 3: Client Materials ──
  main.appendChild(buildSectionTitle('③', 'Client Material — Inform & Track'));
  main.appendChild(buildMaterialsSection(d.materials || []));

  // ── Section 4: Drawings ──
  main.appendChild(buildSectionTitle('④', 'Drawings Awaited'));
  main.appendChild(buildDrawingsSection(d.drawings || []));

  // ── Section 5: DPR Archive (internal) ──
  if (!isClientView) {
    main.appendChild(buildSectionTitle('⑤', 'DPR Archive', true));
    main.appendChild(buildDPRArchive(d.dprs || []));
  }

  // ── Section 6: Flags (internal) ──
  if (!isClientView) {
    main.appendChild(buildSectionTitle('⑥', 'Flags & Actions', true));
    main.appendChild(buildFlags(d.activities || [], d.materials || [], d.drawings || [], today));
  }

  // ── Section 7: Procurement Schedule (internal + client) ──
  main.appendChild(buildSectionTitle('⑦', 'Procurement Schedule'));
  main.appendChild(buildProcurementSection(d.materials || []));
}

// ─── SECTION TITLE ────────────────────────────────────────────
function buildTimelineSectionHeader() {
  const header = document.createElement('div');
  header.className = 'section-header';
  header.style.cssText = `
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 12px;
  `;
  header.innerHTML = `
    <div style="display:flex;align-items:center;gap:8px;">
      <span class="section-num">①</span>
      <h2 style="margin:0;">PROJECT TIMELINE</h2>
    </div>
    <div id="ganttToggles" style="
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    ">
      <button id="toggleMRD" class="gantt-toggle-btn ${ganttOverlayState.mrd ? 'active' : ''}"
        onclick="toggleGanttOverlay('mrd')">
        ◆ Material Dates
      </button>
      <button id="toggleDRW" class="gantt-toggle-btn ${ganttOverlayState.drw ? 'active' : ''}"
        onclick="toggleGanttOverlay('drw')">
        ▲ Drawing Deadlines
      </button>
    </div>
  `;
  return header;
}

function buildSectionTitle(num, label, internalOnly) {
  const div = document.createElement('div');
  div.className = 'section-title';
  div.innerHTML = `<span class="section-num">${num}</span> ${label}`;
  if (internalOnly) {
    const badge = document.createElement('span');
    badge.className = 'internal-only';
    badge.textContent = 'INTERNAL';
    div.appendChild(badge);
  }
  return div;
}

// ─── GANTT (HYBRID HTML LABELS + CANVAS BARS) ─────────────────
function buildGantt(activities, dprs, today, startDate, endDate) {
  const wrap = document.createElement('div');
  wrap.className = 'gantt-wrap';

  if (!activities.length) {
    wrap.innerHTML = '<div class="empty-state">No activities set up yet.</div>';
    return wrap;
  }

  // Compute chart bounds
  const allDates = activities.flatMap(a => [a.planned_start, a.planned_end, a.current_end, a.planned_end_original]).map(parseSheetDate).filter(Boolean);
  if (!allDates.length) { wrap.innerHTML = '<div class="empty-state">No date data in activities.</div>'; return wrap; }

  const minD = new Date(Math.min(...allDates, today));
  const maxD = new Date(Math.max(...allDates, today));
  minD.setDate(1);
  maxD.setMonth(maxD.getMonth() + 1); maxD.setDate(1);

  const ROW_H      = 36;
  const LABEL_W    = 200;
  const PX_PER_DAY = 7;
  const totalDays  = Math.ceil((maxD - minD) / 86400000);
  const chartW     = totalDays * PX_PER_DAY;

  const isDark  = document.body.classList.contains('dark');
  const gridC   = isDark ? '#2a2a2a' : '#e0dbd3';
  const amberC  = isDark ? '#d4872a' : '#b8711f';
  const colorMap = {
    completed:      '#1e8449',
    on_track:       '#1a6fa0',
    on_track_delayed: '#d4ac0d',
    delayed_heavy:  '#a93226',
    not_started:    isDark ? '#3a3530' : '#c8c0b8',
  };

  function dayX(d) {
    const parsed = parseSheetDate(d);
    return parsed ? Math.round((parsed - minD) / 86400000) * PX_PER_DAY : 0;
  }

  // ── SCROLL WRAPPER ──
  const scrollDiv = document.createElement('div');
  scrollDiv.className = 'gantt-scroll';

  const container = document.createElement('div');
  container.className = 'g-container';

  // ── AXIS ROW (HTML spans — full CSS font rendering) ──
  const axisRow = document.createElement('div');
  axisRow.className = 'g-axis-row';

  const axSpacer = document.createElement('div');
  axSpacer.className = 'g-axis-label-spacer';
  axSpacer.style.width = LABEL_W + 'px';
  axisRow.appendChild(axSpacer);

  const axTicks = document.createElement('div');
  axTicks.className = 'g-axis-ticks';
  axTicks.style.width  = chartW + 'px';
  axTicks.style.height = '28px';

  let prevLabelX = -999;
  let prevYear   = null;
  const cur = new Date(minD);
  while (cur <= maxD) {
    const x = Math.round((cur - minD) / 86400000) * PX_PER_DAY;
    if (x - prevLabelX > 50) {
      const month = cur.toLocaleDateString('en-GB', { month: 'short' });
      const year  = cur.getFullYear().toString().slice(2);
      const showYear = (prevYear !== cur.getFullYear());
      prevYear = cur.getFullYear();

      const sp = document.createElement('span');
      sp.style.left = x + 'px';
      sp.textContent = showYear ? `${month} '${year}` : month;
      axTicks.appendChild(sp);
      prevLabelX = x;
    }
    cur.setMonth(cur.getMonth() + 1);
  }
  axisRow.appendChild(axTicks);
  container.appendChild(axisRow);

  // Today X position
  const todayX = dayX(today);

  // ── ACTIVITY ROWS ──
  const ganttBarsContainer = document.createElement('div');
  ganttBarsContainer.style.cssText = 'position:relative';

  activities.forEach((act, i) => {
    const row = document.createElement('div');
    row.className = 'g-row';
    row.addEventListener('click', () => openGanttDetail(act, dprs));

    // HTML label — pure CSS, zero canvas text
    const label = document.createElement('div');
    label.className = 'g-label';
    label.style.width = LABEL_W + 'px';
    label.style.borderRight = '1px solid var(--border)';
    label.style.marginRight = '0';
    label.textContent = act.activity || act.name || '';
    row.appendChild(label);

    // Canvas track — bars only, no text
    const track = document.createElement('canvas');
    track.className = 'g-track';
    track.width  = chartW;
    track.height = ROW_H;
    const ctx = track.getContext('2d');

    // Row background
    ctx.fillStyle = i % 2 === 0
      ? (isDark ? 'rgba(255,255,255,0.02)' : 'rgba(0,0,0,0.02)')
      : 'transparent';
    ctx.fillRect(0, 0, chartW, ROW_H);

    // Vertical grid lines for month starts
    const cm2 = new Date(minD);
    while (cm2 <= maxD) {
      const gx = Math.round((cm2 - minD) / 86400000) * PX_PER_DAY;
      ctx.strokeStyle = gridC; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, ROW_H); ctx.stroke();
      cm2.setMonth(cm2.getMonth() + 1);
    }

    // Bar colour
    let barColor = colorMap.not_started;
    const status   = (act.status || '').toLowerCase();
    const slipDays = Number(act.total_slippage_days) || 0;
    if      (status === 'completed')                               barColor = colorMap.completed;
    else if (status === 'on_track' || status === 'in_progress')    barColor = colorMap.on_track;
    else if (status === 'delayed' && slipDays <= 7)                barColor = colorMap.on_track_delayed;
    else if (status === 'delayed' && slipDays > 7)                 barColor = colorMap.delayed_heavy;

    if (act.planned_start && (act.current_end || act.planned_end)) {
      const x1  = dayX(act.planned_start);
      const xPE = dayX(act.planned_end || act.current_end);
      const xCE = dayX(act.current_end || act.planned_end);
      const barH = ROW_H - 16;
      const barY = 8;

      // Main bar (to planned_end)
      if (xPE > x1) {
        ctx.fillStyle = barColor;
        ctx.beginPath();
        ctx.roundRect(x1, barY, Math.max(xPE - x1, 4), barH, 3);
        ctx.fill();
      }

      // Work increase extension (current_end > planned_end)
      if (compareSheetDates(act.current_end, act.planned_end) > 0) {
        ctx.fillStyle = '#7d3c98';
        ctx.globalAlpha = 0.8;
        ctx.beginPath();
        ctx.roundRect(xPE, barY, Math.max(xCE - xPE, 4), barH, 3);
        ctx.fill();
        ctx.globalAlpha = 1;
      }

      // Planned end tick
      if (act.planned_end && act.planned_end !== act.current_end) {
        ctx.strokeStyle = isDark ? '#555' : '#bbb';
        ctx.lineWidth = 1.5;
        ctx.setLineDash([2, 2]);
        ctx.beginPath(); ctx.moveTo(xPE, 4); ctx.lineTo(xPE, ROW_H - 5); ctx.stroke();
        ctx.setLineDash([]);
      }
    }

    // Today line (amber)
    ctx.strokeStyle = amberC; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(todayX, 0); ctx.lineTo(todayX, ROW_H); ctx.stroke();

    row.appendChild(track);
    ganttBarsContainer.appendChild(row);
  });

  const totalChartHeight = activities.length * ROW_H;
  const totalChartWidth = chartW;

  (dashData && dashData.materials || []).forEach(mat => {
    const date = parseSheetDate(mat.required_on_site_date);
    if (!date || (mat.status || '').toLowerCase().trim() === 'received') return;
    const mx = Math.round((date - minD) / 86400000) * PX_PER_DAY;
    if (mx < 0 || mx > totalChartWidth) return;

    const line = document.createElement('div');
    line.className = 'gantt-overlay-line gantt-overlay-mrd';
    line.style.cssText = `
      position: absolute;
      left: ${LABEL_W + mx}px;
      top: 0;
      width: 1.5px;
      height: ${totalChartHeight}px;
      background: repeating-linear-gradient(
        to bottom,
        var(--amber) 0px,
        var(--amber) 5px,
        transparent 5px,
        transparent 10px
      );
      opacity: 0.6;
      pointer-events: none;
      z-index: 2;
      display: ${ganttOverlayState.mrd ? 'block' : 'none'};
    `;

    const hit = document.createElement('div');
    hit.className = 'gantt-overlay-mrd';
    hit.style.cssText = `
      position: absolute;
      left: ${LABEL_W + mx - 8}px;
      top: 0;
      width: 16px;
      height: ${totalChartHeight}px;
      cursor: pointer;
      z-index: 3;
      display: ${ganttOverlayState.mrd ? 'block' : 'none'};
    `;
    hit.onclick = (e) => {
      e.stopPropagation();
      showOverlayPopover(e, {
        icon: '◆',
        color: 'var(--amber)',
        title: mat.material_name || mat.material || mat.name || 'Material',
        rows: [
          ['Area', mat.area || '—'],
          ['Required On Site', fmtDate(mat.required_on_site_date)],
          ['Status', mat.status || '—'],
          ['Notes', mat.notes || '—']
        ]
      });
    };
    ganttBarsContainer.appendChild(line);
    ganttBarsContainer.appendChild(hit);
  });

  (dashData && dashData.drawings || []).forEach(drw => {
    const date = parseSheetDate(drw.required_by_date);
    if (!date || (drw.status || '').toLowerCase().trim() === 'received') return;
    const mx = Math.round((date - minD) / 86400000) * PX_PER_DAY;
    if (mx < 0 || mx > totalChartWidth) return;

    const line = document.createElement('div');
    line.className = 'gantt-overlay-line gantt-overlay-drw';
    line.style.cssText = `
      position: absolute;
      left: ${LABEL_W + mx}px;
      top: 0;
      width: 1.5px;
      height: ${totalChartHeight}px;
      background: repeating-linear-gradient(
        to bottom,
        #7d3c98 0px,

function openGanttDetail(act, dprs) {
  const panel = document.getElementById('ganttDetail');
  if (!panel) return;
  panel.classList.add('visible');

  const actName = act.activity || act.name || '';
  const slipDays = Number(act.total_slippage_days) || 0;
  const status = (act.status || '').toLowerCase();
  const changeEntries = getTimelineDetailEntries(act);

  const plannedEndD  = parseSheetDate(act.planned_end);
  const currentEndD  = parseSheetDate(act.current_end);
  const earlyDays    = (status === 'completed' && plannedEndD && currentEndD && currentEndD < plannedEndD)
    ? Math.round((plannedEndD - currentEndD) / 86400000)
    : 0;

  let html = `<div class="detail-title">${actName}</div>`;
  html += `<div class="detail-grid">`;
  html += detailCell('Planned Start', fmtDateShort(act.planned_start) || '—');
  html += detailCell('Planned End', fmtDateShort(act.planned_end) || '—');
  html += detailCell('Actual End', fmtDateShort(act.current_end) || '—');
  html += detailCell('Status', (act.status || '—').replace(/_/g,' ').toUpperCase());
  if (earlyDays > 0) {
    html += `<div><div class="detail-cell-label">Completion</div><div class="detail-cell-value" style="color:#1e8449;font-weight:600">${earlyDays} day${earlyDays > 1 ? 's' : ''} early ✓</div></div>`;
  } else {
    html += detailCell('Total Slippage', slipDays ? `${slipDays} days` : '0 days');
  }
  html += `</div>`;

  if (changeEntries.length) {
    html += `<div class="change-log-title">Change Log</div>`;
    changeEntries.forEach(entry => {
      const cls = entry.includes('WORK INCREASE') ? 'work-increase' : entry.includes('START DELAYED') ? 'start-delayed' : 'delay';
      html += `<div class="change-entry ${cls}">${entry}</div>`;
    });
  }

  if (!isClientView) {
    // DPR mentions
    const mentions = (dprs || []).filter(dpr => {
      const text = (dpr.report || dpr.formatted_report || '').toLowerCase();
      return text.includes(actName.toLowerCase().split(' ')[0]);
    });
    if (mentions.length) {
      html += `<div class="change-log-title">Mentions in DPRs</div>`;
      mentions.slice(0, 5).forEach(dpr => {
        html += `<div class="change-entry delay" style="background:transparent;border:1px solid var(--border);color:var(--dim)"><strong style="color:var(--amber)">${fmtDateShort(dpr.date)}</strong> — ${(dpr.report || dpr.formatted_report || '').substring(0, 100)}...</div>`;
      });
    }
  }

  panel.innerHTML = html;
  panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function getTimelineDetailEntries(act) {
  const entries = [];
  const seen = {};
  function add(entry) {
    const clean = String(entry || '').trim();
    if (!clean || seen[clean]) return;
    seen[clean] = true;
    entries.push(clean);
  }

  String(act.delay_log || '').split('\n').forEach(add);

  const projectKey = normalizeTimelineDetailKey((dashData && dashData.project) || currentProject);
  const activityKey = normalizeTimelineDetailKey(act.activity || act.name || '');
  const projectNotes = TIMELINE_DETAIL_NOTES[projectKey] || {};
  (projectNotes[activityKey] || []).forEach(add);

  // Show most recent entries first
  return entries.reverse();
}

function normalizeTimelineDetailKey(value) {
  return String(value || '')
    .toLowerCase()
    .replace(/&/g, ' and ')
    .replace(/\blights\b/g, 'light')
    .replace(/[^a-z0-9]+/g, ' ')
    .trim()
    .replace(/\s+/g, ' ');
}

function detailCell(label, value) {
  return `<div><div class="detail-cell-label">${label}</div><div class="detail-cell-value">${value}</div></div>`;
}

  ['today','overtime'].forEach(v => {
    document.getElementById(`strView-${v}`).style.display = v === view ? 'block' : 'none';
    document.getElementById(`strTab-${v}`).classList.toggle('active', v === view);
  });
};

function buildStrengthToday(dprs) {
  if (!dprs.length) return '<div class="empty-state">No DPR data.</div>';

  // Get most recent DPR
  const sorted = [...dprs].sort((a,b) => {
    const da = parseSheetDate(a.date);
    const db = parseSheetDate(b.date);
    return (db ? db.getTime() : 0) - (da ? da.getTime() : 0);
  });
  const latest = sorted[0];
  const reportText = latest.report || latest.formatted_report || '';
  const tradeData  = parseTradesFromDPR(reportText);

  if (!tradeData.total) return `<div class="empty-state">No site strength data in latest DPR (${fmtDateShort(latest.date)}).</div>`;

  let html = `<div class="strength-total">${tradeData.total}</div>`;
  html += `<div class="strength-label">TOTAL ON SITE — LAST REPORTED: ${fmtDateShort(latest.date)}</div>`;

  tradeData.trades.forEach(t => {
    const pct = tradeData.total > 0 ? (t.count / tradeData.total) * 100 : 0;
    html += `
      <div class="trade-bar-row">
        <div class="trade-bar-label"><span>${t.name}</span><span>${t.count}</span></div>
        <div class="trade-bar-track"><div class="trade-bar-fill" style="width:${pct.toFixed(1)}%"></div></div>
      </div>`;
  });

  return html;
}

function parseTradesFromDPR(text) {
  // Extract 👷 Site Strength block
  const match = text.match(/👷 Site Strength[:\s]*([\d]+)(.*?)(?=✅|🔄|⚠️|📅|$)/s);
  if (!match) return { total: 0, trades: [] };
  const total = parseInt(match[1]) || 0;
  const block = match[2] || '';
  const trades = [];
  const lines = block.split('\n');
  lines.forEach(line => {
    const m = line.match(/•\s*([^:]+):\s*(\d+)/);
    if (m) trades.push({ name: m[1].trim(), count: parseInt(m[2]) });
  });
  return { total, trades };
}

function buildStrengthChart(dprs) {
  if (!dprs.length) return Object.assign(document.createElement('div'), { className: 'empty-state', textContent: 'No DPR data.' });

  const canvas = document.createElement('canvas');
  canvas.className = 'canvas-chart';
  canvas.height = 200;

  // Collect trade data over time
  const timelineData = {};
  const allTrades = new Set();
  const dates = [];

  dprs.slice(-20).forEach(dpr => {
    const td = parseTradesFromDPR(dpr.report || dpr.formatted_report || '');
    if (!td.total) return;
    dates.push(dpr.date);
    td.trades.forEach(t => {
      allTrades.add(t.name);
      if (!timelineData[t.name]) timelineData[t.name] = {};
      timelineData[t.name][dpr.date] = t.count;
    });
  });

  if (!dates.length) return Object.assign(document.createElement('div'), { className: 'empty-state', textContent: 'No trade data found in DPRs.' });

  const tradeColors = ['#d4872a','#1a6fa0','#1e8449','#7d3c98','#a93226','#d4ac0d','#5d6d7e'];
  const trades = [...allTrades];

  requestAnimationFrame(() => {
    const W = canvas.parentElement ? canvas.parentElement.clientWidth || 600 : 600;
    canvas.width = W;
    const ctx = canvas.getContext('2d');
    const padL = 30, padR = 10, padT = 10, padB = 50;
    const cW = W - padL - padR;
    const cH = 200 - padT - padB;

    const maxVal = Math.max(...trades.flatMap(t => dates.map(d => timelineData[t]?.[d] || 0)));
    const isDark = document.body.classList.contains('dark');
    const gridColor = isDark ? '#2a2a2a' : '#e0dbd3';
    const textColor = isDark ? '#7a7268' : '#9a9188';

    ctx.clearRect(0, 0, W, 200);

    // Grid + Y axis
    for (let v = 0; v <= maxVal; v += Math.ceil(maxVal / 4)) {
      const y = padT + cH - (v / maxVal) * cH;
      ctx.strokeStyle = gridColor; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(padL, y); ctx.lineTo(padL + cW, y); ctx.stroke();
      ctx.fillStyle = textColor; ctx.font = '10px DM Mono,monospace';
      ctx.fillText(v, 2, y + 4);
    }

    // Lines per trade
    trades.forEach((trade, ti) => {
      const color = tradeColors[ti % tradeColors.length];
      ctx.strokeStyle = color; ctx.lineWidth = 2;
      ctx.beginPath();
      dates.forEach((d, di) => {
        const x = padL + (di / (dates.length - 1 || 1)) * cW;
        const val = timelineData[trade]?.[d] || 0;
        const y = padT + cH - (maxVal ? (val / maxVal) * cH : 0);
        di === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      });
      ctx.stroke();

      // Dots
      dates.forEach((d, di) => {
        const x = padL + (di / (dates.length - 1 || 1)) * cW;
        const val = timelineData[trade]?.[d] || 0;
        const y = padT + cH - (maxVal ? (val / maxVal) * cH : 0);
        ctx.fillStyle = color;
        ctx.beginPath(); ctx.arc(x, y, 3, 0, Math.PI * 2); ctx.fill();
      });
    });

    // X axis dates
    dates.forEach((d, di) => {
      const x = padL + (di / (dates.length - 1 || 1)) * cW;
      ctx.save(); ctx.translate(x, padT + cH + 10); ctx.rotate(-Math.PI / 4);
      ctx.fillStyle = textColor; ctx.font = '9px DM Mono,monospace';
      ctx.fillText(String(d).substring(0, 8), 0, 0);
      ctx.restore();
    });
  });

  return canvas;
}

// ─── MATERIALS SECTION ────────────────────────────────────────
function buildMaterialsSection(materials) {
  const wrap = document.createElement('div');
  wrap.className = 'material-section';

  if (!isClientView) {
    const intro = document.createElement('div');
    intro.className = 'material-intro';
    intro.textContent = 'Client-procured materials only. Delivered items hidden in client view.';
    wrap.appendChild(intro);
  }

  const rawFiltered = isClientView
    ? materials.filter(m => !['received'].includes((m.status || m.condition || '').toLowerCase()))
    : materials;

  const filtered = [...rawFiltered].sort((a, b) => {
    const da = parseSheetDate(a.target_date);
    const db = parseSheetDate(b.target_date);
    if (!da && !db) return 0;
    if (!da) return 1;
    if (!db) return -1;
    return da - db;
  });

  if (!filtered.length) {
    wrap.innerHTML += '<div class="empty-state">No material entries yet.</div>';
    return wrap;
  }

  filtered.forEach(m => {
    const row = document.createElement('div');
    row.className = 'material-row';

    // Column 1 — name + area
    const nameDiv = document.createElement('div');
    nameDiv.innerHTML = `<div class="material-name">${m.material || m.name || '—'}</div><div class="material-area">${m.area || ''}</div>`;

    // Column 2 — target date (own column, not crowded next to name)
    const metaDiv = document.createElement('div');
    metaDiv.className = 'material-meta';
    if (m.target_date) {
      const td = parseSheetDate(m.target_date);
      const overdue = td && td < new Date();
      metaDiv.innerHTML = `Target: <span style="${overdue ? 'color:var(--red);font-weight:500' : ''}">${fmtDate(m.target_date)}</span>`;
    } else {
      metaDiv.textContent = '—';
    }

    // Column 3 — status badge
    const statusStr = getMatStatus(m);
    const badge = document.createElement('span');
    badge.className = `status-badge ${statusStr.cls}`;
    badge.textContent = statusStr.label;

    row.appendChild(nameDiv);
    row.appendChild(metaDiv);
    row.appendChild(badge);
    wrap.appendChild(row);
  });

  return wrap;
}

function getMatStatus(m) {
  const s = (m.status || m.condition || '').toLowerCase();
  if (s.includes('not') && s.includes('inform')) return { label: 'NOT YET INFORMED', cls: 'badge-red' };
  if (s.includes('client') || s.includes('actioning')) return { label: 'CLIENT ACTIONING', cls: 'badge-amber' };
  if (s.includes('partial')) return { label: 'PARTIAL DELIVERY', cls: 'badge-amber' };
  if (s.includes('overdue')) return { label: 'TARGET OVERDUE', cls: 'badge-red' };
  if (s.includes('ordered')) return { label: 'ORDERED', cls: 'badge-blue' };
  if (s.includes('received') || s.includes('good')) return { label: 'RECEIVED', cls: 'badge-green' };
  if (s.includes('damaged')) return { label: 'DAMAGED', cls: 'badge-red' };
  return { label: s.toUpperCase() || 'UNKNOWN', cls: 'badge-amber' };
}

// ─── DRAWINGS SECTION ─────────────────────────────────────────
function buildDrawingsSection(drawings) {
  const wrap = document.createElement('div');
  wrap.className = 'material-section';

  const rawFiltered = isClientView
    ? drawings.filter(d => (d.status || '').toLowerCase().trim() !== 'received')
    : drawings;

  const filtered = [...rawFiltered].sort((a, b) => {
    const da = parseSheetDate(a.required_by_date);
    const db = parseSheetDate(b.required_by_date);
    if (!da && !db) return 0;
    if (!da) return 1;
    if (!db) return -1;
    return da - db;
  });

  if (!filtered.length) {
    wrap.innerHTML = '<div class="empty-state">No drawing requirements set up yet.</div>';
    return wrap;
  }

  const today = new Date();
  today.setHours(0, 0, 0, 0);

  filtered.forEach(drw => {
    const row = document.createElement('div');
    row.className = 'material-row';

    // Column 1 — drawing name + type
    const nameDiv = document.createElement('div');
    nameDiv.innerHTML = `<div class="material-name">${drw.drawing_name || '—'}</div><div class="material-area">${drw.drawing_type || ''}</div>`;

    // Column 2 — required-by date in its own column
    const reqDate = parseSheetDate(drw.required_by_date);
    const overdue = reqDate && reqDate < today && (drw.status || '').toLowerCase().trim() !== 'received';

    const metaDiv = document.createElement('div');
    metaDiv.className = 'material-meta';
    if (drw.required_by_date) {
      metaDiv.innerHTML = `Required By: <span style="${overdue ? 'color:var(--red);font-weight:500' : ''}">${fmtDate(drw.required_by_date)}</span>`;
    } else {
      metaDiv.textContent = '—';
    }

    // Column 3 — status badge
    const badge = document.createElement('span');
    const status = getDrawingStatus(drw);
    badge.className = `status-badge ${status.cls}`;
    badge.textContent = status.label;

    row.appendChild(nameDiv);
    row.appendChild(metaDiv);
    row.appendChild(badge);
    wrap.appendChild(row);
  });

  return wrap;
}

function getDrawingStatus(drw) {
  const s = (drw.status || '').toLowerCase().trim();
  if (s === 'awaited') return { label: 'AWAITED', cls: 'badge-red' };
  if (s === 'received') return { label: 'RECEIVED', cls: 'badge-green' };
  if (s === 'revision pending') return { label: 'REVISION PENDING', cls: 'badge-amber' };
  if (s === 'superseded') return { label: 'SUPERSEDED', cls: 'badge-grey' };
  return { label: s.toUpperCase() || 'UNKNOWN', cls: 'badge-amber' };
}
